<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<!-- Content-Security-Policy: restrict what this page may load. Embedding is
     limited to the known project origins; no external scripts are permitted. -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-src 'self' https://boomrxmaps.com https://flbocateam.github.io https://jms-metrics.github.io; base-uri 'self'; form-action 'none'; object-src 'none'" />
<!-- build: 2026-07-20 (security hardening redeploy) -->
<title>JMS Hub — Project Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛰️</text></svg>" />
<style>
  /* =========================================================
     JMS HUB — single-file static dashboard
     Theme: "Aether Flow" purple particle network in the menu bar.
     Menu bar collapses to a narrow, still-clickable rail.
     To ADD / EDIT / REMOVE a project, scroll to the PROJECTS array.
     ========================================================= */

  :root {
    --bg: #000000;
    --panel: rgba(18, 14, 28, 0.55);
    --border: #2a2440;
    --border-soft: rgba(191, 128, 255, 0.16);
    --text: #f3f0fa;
    --text-dim: rgba(243, 240, 250, 0.6);
    --accent: #bf80ff;
    --accent-strong: #a855f7;
    --live: #34d399;
    --radius: 14px;
    --sidebar-w: 290px;
    --rail-w: 76px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden;
  }

  #bg-canvas { position: fixed; inset: 0; width: 100%; height: 100%; display: block; z-index: 0; }

  #veil {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background:
      radial-gradient(130% 100% at 50% -20%, rgba(124,58,237,0.14), rgba(0,0,0,0.30) 78%),
      linear-gradient(180deg, rgba(0,0,0,0.10), rgba(0,0,0,0.26));
  }

  .app {
    position: relative;
    z-index: 2;
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    grid-template-rows: 100vh;
    height: 100vh;
    transition: grid-template-columns .28s ease;
  }
  /* Collapsed -> narrow rail (still shows clickable project buttons) */
  .app.collapsed { grid-template-columns: var(--rail-w) 1fr; }

  /* ---------------- Sidebar (the featured menu bar) ---------------- */
  .sidebar {
    position: relative;
    overflow: hidden;
    background: #09060f;
    border-right: 1px solid var(--accent-strong);
    box-shadow: 0 0 40px rgba(168,85,247,0.18);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  #side-canvas { position: absolute; inset: 0; z-index: 0; }
  .side-veil {
    position: absolute; inset: 0; z-index: 1; pointer-events: none;
    background: linear-gradient(180deg, rgba(9,6,15,0.30), rgba(9,6,15,0.58));
  }
  .brand, .nav-label, .nav, .sidebar-foot { position: relative; z-index: 2; }

  /* Collapse toggle — lives in the purple bar */
  .rail-toggle {
    position: absolute; z-index: 5; top: 15px; right: 14px;
    width: 30px; height: 30px; border-radius: 9px;
    display: grid; place-items: center; cursor: pointer;
    background: rgba(191,128,255,0.16);
    border: 1px solid var(--border-soft);
    color: #ecdfff;
    transition: background .18s, right .28s ease, left .28s ease;
  }
  .rail-toggle:hover { background: rgba(191,128,255,0.30); }
  .rail-toggle svg { width: 16px; height: 16px; transition: transform .28s ease; }
  .app.collapsed .rail-toggle { right: 0; left: 0; margin: 0 auto; top: 13px; }
  .app.collapsed .rail-toggle svg { transform: rotate(180deg); }

  .brand { padding: 20px 20px 16px; border-bottom: 1px solid var(--border-soft); }
  .brand h1 {
    font-size: 21px; font-weight: 800; letter-spacing: -0.03em;
    display: flex; align-items: center; gap: 9px;
    background: linear-gradient(180deg, #ffffff, #c4b1f0);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    text-shadow: 0 0 24px rgba(168,85,247,0.25);
  }
  .brand .logo {
    width: 30px; height: 30px; border-radius: 9px;
    display: grid; place-items: center;
    background: linear-gradient(160deg, #3b2a63, #150f24);
    border: 1px solid var(--border); box-shadow: 0 0 18px rgba(168,85,247,0.4);
    font-size: 16px; -webkit-text-fill-color: initial;
  }
  .brand p { margin-top: 6px; font-size: 11.5px; color: var(--text-dim); letter-spacing: 0.02em; }

  .nav-label {
    padding: 16px 20px 8px; font-size: 10.5px; text-transform: uppercase;
    letter-spacing: 0.12em; color: var(--text-dim);
  }

  .nav { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 0 12px 12px; display: flex; flex-direction: column; gap: 6px; }
  .nav::-webkit-scrollbar { width: 8px; }
  .nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }

  .proj-btn {
    width: 100%; text-align: left; cursor: pointer;
    border: 1px solid transparent; background: rgba(10,7,18,0.35);
    color: var(--text); border-radius: 11px; padding: 10px 12px;
    display: flex; align-items: center; gap: 11px;
    backdrop-filter: blur(2px);
    transition: background .18s, border-color .18s, transform .18s, box-shadow .18s;
  }
  .proj-btn:hover { background: rgba(191,128,255,0.12); border-color: var(--border-soft); }
  .proj-btn.active {
    background: rgba(168,85,247,0.20); border-color: rgba(191,128,255,0.55);
    box-shadow: inset 0 0 0 1px rgba(191,128,255,0.12), 0 0 24px rgba(168,85,247,0.30);
  }

  /* Per-project avatar (initials) with a live dot — always the click target */
  .avatar {
    position: relative; flex-shrink: 0;
    width: 36px; height: 36px; border-radius: 9px;
    display: grid; place-items: center;
    font-size: 12.5px; font-weight: 800; letter-spacing: -0.02em; color: #efe6ff;
    background: linear-gradient(160deg, #3a2a5e, #1a1230);
    border: 1px solid var(--border-soft);
  }
  .proj-btn.active .avatar { border-color: rgba(191,128,255,0.7); box-shadow: 0 0 12px rgba(168,85,247,0.4); }
  .avatar .dot {
    position: absolute; right: -3px; bottom: -3px;
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--live); box-shadow: 0 0 0 2px #0b0812;
  }
  .proj-btn .meta { min-width: 0; }
  .proj-btn .name { font-size: 13.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .proj-btn .host { font-size: 11px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .sidebar-foot {
    padding: 12px 16px 16px; border-top: 1px solid var(--border-soft);
    font-size: 10.5px; color: var(--text-dim); display: flex; align-items: center; gap: 7px;
  }
  .live-pip { position: relative; width: 8px; height: 8px; flex-shrink: 0; }
  .live-pip span { position:absolute; inset:0; border-radius:50%; }
  .live-pip .ping { background: var(--live); opacity:.75; animation: ping 1.6s cubic-bezier(0,0,.2,1) infinite; }
  .live-pip .core { background: var(--live); transform: scale(.55); }
  @keyframes ping { 75%,100% { transform: scale(2.4); opacity: 0; } }

  /* -------- Collapsed (rail) mode -------- */
  .app.collapsed .brand,
  .app.collapsed .nav-label { display: none; }
  .app.collapsed .nav { padding: 54px 0 12px; align-items: center; gap: 8px; }
  .app.collapsed .proj-btn { width: 52px; justify-content: center; padding: 8px; }
  .app.collapsed .proj-btn .meta { display: none; }
  .app.collapsed .sidebar-foot { justify-content: center; }
  .app.collapsed .sidebar-foot #foot-count { display: none; }

  /* ---------------- Main viewer ---------------- */
  .main { display: flex; flex-direction: column; min-width: 0; padding: 14px 14px 14px 0; }
  .app.collapsed .main { padding-left: 14px; }

  .viewer-shell {
    flex: 1; display: flex; flex-direction: column;
    border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
    background: var(--panel); backdrop-filter: blur(14px) saturate(130%); -webkit-backdrop-filter: blur(14px) saturate(130%);
    box-shadow: 0 0 40px rgba(124,58,237,0.10); min-height: 0;
  }

  .toolbar {
    display: flex; align-items: center; gap: 12px; padding: 11px 14px;
    border-bottom: 1px solid var(--border-soft); background: rgba(10,8,18,0.35);
  }
  .toolbar .title { font-size: 14px; font-weight: 700; letter-spacing: -0.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .toolbar .url-pill {
    flex: 1; min-width: 0; font-size: 12px; color: var(--text-dim);
    background: rgba(191,128,255,0.05); border: 1px solid var(--border-soft);
    border-radius: 999px; padding: 6px 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .btn {
    cursor: pointer; border: 1px solid var(--border); background: rgba(191,128,255,0.05);
    color: var(--text); border-radius: 999px; padding: 7px 14px; font-size: 12.5px; font-weight: 600;
    display: inline-flex; align-items: center; gap: 7px; white-space: nowrap;
    transition: transform .15s, background .15s, border-color .15s, box-shadow .15s;
  }
  .btn:hover { background: rgba(191,128,255,0.12); transform: translateY(-1px); }
  .btn svg { width: 15px; height: 15px; }
  .btn.primary { border-color: rgba(168,85,247,0.5); background: rgba(168,85,247,0.18); color: #f1e6ff; box-shadow: 0 0 16px rgba(168,85,247,0.18); }
  .btn.primary:hover { background: rgba(168,85,247,0.28); }

  .frame-wrap { position: relative; flex: 1; min-height: 0; background: #0a0810; }
  iframe.viewer { width: 100%; height: 100%; border: 0; display: block; background: #0a0810; }

  .overlay {
    position: absolute; inset: 0; display: none;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; text-align: center; padding: 30px; background: rgba(8,6,14,0.92);
  }
  .overlay.show { display: flex; }
  .overlay .spinner { width: 34px; height: 34px; border-radius: 50%; border: 3px solid rgba(191,128,255,0.18); border-top-color: var(--accent); animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .overlay h3 { font-size: 16px; font-weight: 700; }
  .overlay p { font-size: 13px; color: var(--text-dim); max-width: 430px; line-height: 1.55; }

  /* ---------------- Mobile ---------------- */
  .scrim { display: none; position: fixed; inset: 0; z-index: 20; background: rgba(0,0,0,0.5); }
  .mobile-bar { display: none; }
  @media (max-width: 820px) {
    .app, .app.collapsed { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    .sidebar { position: fixed; z-index: 30; top: 0; bottom: 0; left: 0; width: 86%; max-width: 320px; transform: translateX(-105%); transition: transform .25s ease; }
    .sidebar.open { transform: translateX(0); }
    /* On phones the menu opens/closes via the hamburger, not the rail toggle */
    .rail-toggle { display: none; }
    /* Force full labels on mobile even if "collapsed" was remembered */
    .app.collapsed .brand, .app.collapsed .nav-label { display: block; }
    .app.collapsed .nav { padding: 0 12px 12px; align-items: stretch; }
    .app.collapsed .proj-btn { width: 100%; justify-content: flex-start; padding: 10px 12px; }
    .app.collapsed .proj-btn .meta { display: block; }
    .main, .app.collapsed .main { padding: 0; }
    .viewer-shell { border-radius: 0; border-left: 0; border-right: 0; border-bottom: 0; }
    .mobile-bar { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: #09060f; border-bottom: 1px solid var(--accent-strong); z-index: 2; position: relative; }
    .mobile-bar h1 { font-size: 16px; font-weight: 800; }
    .hamburger { cursor: pointer; background: rgba(191,128,255,0.10); border: 1px solid var(--border); border-radius: 10px; width: 40px; height: 40px; display: grid; place-items: center; color: var(--text); }
    .hamburger svg { width: 20px; height: 20px; }
    .scrim.show { display: block; }
    .toolbar .title { display: none; }
  }
</style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div id="veil"></div>

  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <canvas id="side-canvas"></canvas>
      <div class="side-veil"></div>
      <button class="rail-toggle" id="side-toggle" title="Collapse menu" aria-label="Collapse or expand menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="brand">
        <h1><span class="logo">🛰️</span> JMS Hub</h1>
        <p>Mission control for all live dashboards</p>
      </div>
      <div class="nav-label">Projects</div>
      <nav class="nav" id="nav"><!-- buttons injected by JS --></nav>
      <div class="sidebar-foot">
        <span class="live-pip"><span class="ping"></span><span class="core"></span></span>
        <span id="foot-count">All systems live</span>
      </div>
    </aside>
    <div class="scrim" id="scrim"></div>

    <!-- Main -->
    <section class="main">
      <div class="mobile-bar">
        <button class="hamburger" id="hamburger" aria-label="Open menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1>JMS Hub</h1>
      </div>

      <div class="viewer-shell">
        <div class="toolbar">
          <span class="title" id="vw-title">—</span>
          <span class="url-pill" id="vw-url">Select a project</span>
          <button class="btn" id="vw-reload" title="Reload panel">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            Reload
          </button>
          <a class="btn primary" id="vw-external" href="#" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            Open in new tab
          </a>
        </div>
        <div class="frame-wrap">
          <iframe class="viewer" id="viewer" title="Project viewer" referrerpolicy="no-referrer"></iframe>
          <div class="overlay" id="overlay">
            <div class="spinner" id="ov-spinner"></div>
            <h3 id="ov-title">Loading…</h3>
            <p id="ov-msg"></p>
            <a class="btn primary" id="ov-link" href="#" target="_blank" rel="noopener" style="display:none">Open in new tab</a>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
  /* =========================================================
     1) PROJECT LIST  ——  EDIT THIS to add/remove dashboards.
        Each entry:  { name: "...", url: "https://..." }
        Optional:    embed: false  -> shows an "open in new tab" panel.
     ========================================================= */
  const PROJECTS = [
    { name: "BoomRx Maps",            url: "https://boomrxmaps.com/" },
    { name: "BoomRx Hub",             url: "https://flbocateam.github.io/Boomrx-hub/" },
    { name: "JMS Clinic Order Streak",url: "https://jms-metrics.github.io/Clinic-Ordering-History/" },
    { name: "JMS Sales Dashboard",    url: "https://flbocateam.github.io/JMS-Dashboard/" },
    { name: "JMS Management Dashboard",url: "https://jms-metrics.github.io/Management-Dashboard/" },
    { name: "JMS Newsfeed",           url: "https://jms-metrics.github.io/Newsfeed/" },
    // Local-only project: master copy lives in your Obsidian vault. A published
    // copy is committed into THIS repo at projects/jack-mark-32/index.html.
    { name: "Jack/Mark 32 Rep Transfer", url: "projects/jack-mark-32/index.html" },
    // { name: "New Project",         url: "https://your-new-url.com/" },
  ];

  /* =========================================================
     2) Wiring
     ========================================================= */
  const navEl     = document.getElementById('nav');
  const viewer    = document.getElementById('viewer');
  const vwTitle   = document.getElementById('vw-title');
  const vwUrl     = document.getElementById('vw-url');
  const vwExt     = document.getElementById('vw-external');
  const vwReload  = document.getElementById('vw-reload');
  const overlay   = document.getElementById('overlay');
  const ovSpinner = document.getElementById('ov-spinner');
  const ovTitle   = document.getElementById('ov-title');
  const ovMsg     = document.getElementById('ov-msg');
  const ovLink    = document.getElementById('ov-link');
  const footCount = document.getElementById('foot-count');

  let activeIndex = -1;
  let loadTimer   = null;

  const hostOf = (u) => { try { return new URL(u, location.href).hostname.replace(/^www\./, '') || u; } catch { return u; } };
  const initialsOf = (name) => {
    const words = name.replace(/^JMS\s+/i, '').replace(/[\/]/g, ' ').split(/\s+/).filter(Boolean);
    return (words.slice(0, 2).map(w => w[0]).join('') || name[0] || '?').toUpperCase();
  };

  PROJECTS.forEach((p, i) => {
    const b = document.createElement('button');
    b.className = 'proj-btn';
    b.title = p.name;   // tooltip — useful in the collapsed rail

    // Built with DOM nodes + textContent (never innerHTML) so a project name
    // can never be interpreted as markup — defensive against HTML injection.
    const avatar = document.createElement('span');
    avatar.className = 'avatar';
    avatar.textContent = initialsOf(p.name);
    const dot = document.createElement('span');
    dot.className = 'dot';
    avatar.appendChild(dot);

    const meta = document.createElement('span');
    meta.className = 'meta';
    const name = document.createElement('span');
    name.className = 'name';
    name.textContent = p.name;
    const host = document.createElement('span');
    host.className = 'host';
    host.textContent = hostOf(p.url);
    meta.appendChild(name);
    meta.appendChild(host);

    b.appendChild(avatar);
    b.appendChild(meta);
    b.addEventListener('click', () => selectProject(i));
    navEl.appendChild(b);
  });
  footCount.textContent = `${PROJECTS.length} live ${PROJECTS.length === 1 ? 'project' : 'projects'}`;

  function selectProject(i) {
    activeIndex = i;
    const p = PROJECTS[i];

    [...navEl.children].forEach((c, idx) => c.classList.toggle('active', idx === i));

    vwTitle.textContent = p.name;
    vwUrl.textContent   = p.url;
    vwExt.href          = p.url;
    ovLink.href         = p.url;

    if (p.embed === false) {
      clearTimeout(loadTimer);
      viewer.onload = null;
      viewer.removeAttribute('src');
      overlay.classList.add('show');
      ovSpinner.style.display = 'none';
      ovTitle.textContent = p.name + ' opens in its own window';
      ovMsg.textContent   = p.name + " blocks being embedded inside other pages, so it can't display in this panel. Use the button below or “Open in new tab” above.";
      ovLink.textContent  = 'Open ' + p.name;
      ovLink.style.display = 'inline-flex';
      closeSidebar();
      if (history.replaceState) history.replaceState(null, '', '#' + i);
      return;
    }

    overlay.classList.add('show');
    ovSpinner.style.display = 'block';
    ovTitle.textContent = 'Loading ' + p.name + '…';
    ovMsg.textContent   = '';
    ovLink.textContent  = 'Open in new tab';
    ovLink.style.display = 'none';

    clearTimeout(loadTimer);
    viewer.onload = () => { clearTimeout(loadTimer); overlay.classList.remove('show'); };
    loadTimer = setTimeout(() => {
      ovSpinner.style.display = 'none';
      ovTitle.textContent = p.name + ' is taking a while to load';
      ovMsg.textContent   = "It's a heavy dashboard, so give it a moment. You can hit Reload, or open it in its own tab.";
      ovLink.textContent  = 'Open ' + p.name;
      ovLink.style.display = 'inline-flex';
    }, 20000);

    // Cache-buster so the panel always pulls the LATEST version of a dashboard
    // (GitHub Pages caches HTML, which would otherwise show a stale copy).
    viewer.src = p.url + (p.url.indexOf('?') === -1 ? '?' : '&') + '_=' + Date.now();
    closeSidebar();
    if (history.replaceState) history.replaceState(null, '', '#' + i);
  }

  vwReload.addEventListener('click', () => { if (activeIndex >= 0) selectProject(activeIndex); });

  // Mobile off-canvas sidebar
  const sidebar = document.getElementById('sidebar');
  const scrim   = document.getElementById('scrim');
  document.getElementById('hamburger').addEventListener('click', () => {
    sidebar.classList.add('open'); scrim.classList.add('show');
  });
  function closeSidebar() { sidebar.classList.remove('open'); scrim.classList.remove('show'); }
  scrim.addEventListener('click', closeSidebar);

  // Collapsible menu bar -> narrow rail. Toggle lives in the purple bar.
  const appEl = document.querySelector('.app');
  const sideToggle = document.getElementById('side-toggle');
  function setCollapsed(v) {
    appEl.classList.toggle('collapsed', v);
    sideToggle.title = v ? 'Expand menu' : 'Collapse menu';
    try { localStorage.setItem('jmshub_collapsed', v ? '1' : '0'); } catch (e) {}
  }
  sideToggle.addEventListener('click', () => setCollapsed(!appEl.classList.contains('collapsed')));
  try { if (localStorage.getItem('jmshub_collapsed') === '1') setCollapsed(true); } catch (e) {}

  const startIdx = Math.min(Math.max(parseInt(location.hash.slice(1)) || 0, 0), PROJECTS.length - 1);
  if (PROJECTS.length) selectProject(startIdx);

  /* =========================================================
     3) "Aether Flow" particle-network engine (shared factory)
     ========================================================= */
  function createField(canvas, o) {
    const ctx = canvas.getContext('2d');
    let parts = [];
    const mouse = { x: null, y: null, r: o.repel };

    function init() {
      parts = [];
      const n = Math.min((canvas.width * canvas.height) / o.density, o.max);
      for (let i = 0; i < n; i++) {
        const s = Math.random() * (o.sizeMax - o.sizeMin) + o.sizeMin;
        parts.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                     dx: (Math.random() * o.speed) - o.speed / 2, dy: (Math.random() * o.speed) - o.speed / 2, s });
      }
    }
    function resize() {
      const r = canvas.getBoundingClientRect();
      canvas.width  = Math.max(1, Math.floor(r.width));
      canvas.height = Math.max(1, Math.floor(r.height));
      init();
    }
    function connect() {
      for (let a = 0; a < parts.length; a++) {
        for (let b = a; b < parts.length; b++) {
          const d = (parts[a].x - parts[b].x) ** 2 + (parts[a].y - parts[b].y) ** 2;
          if (d < o.link) {
            const op = (1 - d / o.link) * o.lineAlpha;
            let near = false;
            if (mouse.x !== null) {
              const mdx = parts[a].x - mouse.x, mdy = parts[a].y - mouse.y;
              if (Math.hypot(mdx, mdy) < mouse.r) near = true;
            }
            ctx.strokeStyle = near ? 'rgba(255,255,255,' + op + ')' : 'rgba(' + o.line + ',' + op + ')';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(parts[a].x, parts[a].y); ctx.lineTo(parts[b].x, parts[b].y); ctx.stroke();
          }
        }
      }
    }
    function stepFrame() {
      requestAnimationFrame(stepFrame);
      ctx.fillStyle = o.bg; ctx.fillRect(0, 0, canvas.width, canvas.height);
      for (const p of parts) {
        if (p.x > canvas.width || p.x < 0) p.dx = -p.dx;
        if (p.y > canvas.height || p.y < 0) p.dy = -p.dy;
        if (mouse.x !== null) {
          const ddx = mouse.x - p.x, ddy = mouse.y - p.y, dist = Math.hypot(ddx, ddy);
          if (dist < mouse.r + p.s && dist > 0) { const f = (mouse.r - dist) / mouse.r; p.x -= (ddx / dist) * f * 4; p.y -= (ddy / dist) * f * 4; }
        }
        p.x += p.dx; p.y += p.dy;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI * 2); ctx.fillStyle = o.dot; ctx.fill();
      }
      connect();
    }
    window.addEventListener('resize', resize);
    window.addEventListener('mousemove', (e) => {
      const r = canvas.getBoundingClientRect();
      const lx = e.clientX - r.left, ly = e.clientY - r.top;
      if (lx >= 0 && ly >= 0 && lx <= r.width && ly <= r.height) { mouse.x = lx; mouse.y = ly; } else { mouse.x = null; mouse.y = null; }
    });
    window.addEventListener('mouseout', () => { mouse.x = null; mouse.y = null; });
    resize(); stepFrame();
  }

  createField(document.getElementById('bg-canvas'), {
    density: 9000, max: 280, link: 20000, lineAlpha: 0.85,
    sizeMin: 1, sizeMax: 3, speed: 0.4, repel: 160,
    dot: 'rgba(191,128,255,0.85)', line: '168,130,235', bg: '#000000'
  });
  createField(document.getElementById('side-canvas'), {
    density: 4200, max: 110, link: 17000, lineAlpha: 1,
    sizeMin: 1, sizeMax: 2.4, speed: 0.35, repel: 130,
    dot: 'rgba(206,156,255,0.95)', line: '198,150,255', bg: '#09060f'
  });
  </script>
</body>
