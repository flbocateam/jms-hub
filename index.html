<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JMS Hub — Project Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛰️</text></svg>" />
<style>
  /* =========================================================
     JMS HUB — single-file static dashboard
     Theme: "Aether Flow" interactive purple particle network.
     To ADD / EDIT / REMOVE a project, scroll to the PROJECTS
     array near the bottom of this file. That's the only thing
     you need to touch.
     ========================================================= */

  :root {
    --bg: #000000;
    --panel: rgba(18, 14, 28, 0.55);
    --panel-solid: #0c0a12;
    --border: #2a2440;
    --border-soft: rgba(191, 128, 255, 0.14);
    --text: #f3f0fa;
    --text-dim: rgba(243, 240, 250, 0.55);
    --accent: #bf80ff;       /* Aether Flow purple */
    --accent-strong: #a855f7;
    --live: #34d399;         /* green = online/live indicator */
    --radius: 14px;
    --sidebar-w: 290px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden;
  }

  /* Particle-network canvas sits behind everything */
  #bg-canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    z-index: 0;
  }

  /* Subtle veil so the network doesn't fight the UI text */
  #veil {
    position: fixed;
    inset: 0;
    z-index: 1;
    background:
      radial-gradient(130% 100% at 50% -20%, rgba(124,58,237,0.10), rgba(0,0,0,0.55) 70%),
      linear-gradient(180deg, rgba(0,0,0,0.25), rgba(0,0,0,0.45));
    pointer-events: none;
  }

  .app {
    position: relative;
    z-index: 2;
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    grid-template-rows: 100vh;
    height: 100vh;
  }

  /* ---------------- Sidebar ---------------- */
  .sidebar {
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .brand {
    padding: 22px 20px 16px;
    border-bottom: 1px solid var(--border-soft);
  }
  .brand h1 {
    font-size: 21px;
    font-weight: 800;
    letter-spacing: -0.03em;
    display: flex;
    align-items: center;
    gap: 9px;
    background: linear-gradient(180deg, #ffffff, #b9a7e6);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .brand .logo {
    width: 30px; height: 30px; border-radius: 9px;
    display: grid; place-items: center;
    background: linear-gradient(160deg, #3b2a63, #150f24);
    border: 1px solid var(--border);
    box-shadow: 0 0 16px rgba(168,85,247,0.25);
    font-size: 16px;
    -webkit-text-fill-color: initial;
  }
  .brand p {
    margin-top: 6px;
    font-size: 11.5px;
    color: var(--text-dim);
    letter-spacing: 0.02em;
  }

  .nav-label {
    padding: 16px 20px 8px;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-dim);
  }

  .nav {
    flex: 1;
    overflow-y: auto;
    padding: 0 12px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .nav::-webkit-scrollbar { width: 8px; }
  .nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }

  .proj-btn {
    width: 100%;
    text-align: left;
    cursor: pointer;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text);
    border-radius: 11px;
    padding: 12px 13px;
    display: flex;
    align-items: center;
    gap: 11px;
    transition: background .18s, border-color .18s, transform .18s, box-shadow .18s;
  }
  .proj-btn:hover { background: rgba(191,128,255,0.07); border-color: var(--border-soft); }
  .proj-btn.active {
    background: rgba(191,128,255,0.12);
    border-color: rgba(191,128,255,0.45);
    box-shadow: inset 0 0 0 1px rgba(191,128,255,0.10), 0 0 22px rgba(168,85,247,0.18);
  }
  .proj-btn .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--live);
    box-shadow: 0 0 0 4px rgba(52,211,153,0.15);
    flex-shrink: 0;
  }
  .proj-btn .meta { min-width: 0; }
  .proj-btn .name {
    font-size: 13.5px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .proj-btn .host {
    font-size: 11px; color: var(--text-dim);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .sidebar-foot {
    padding: 12px 16px 16px;
    border-top: 1px solid var(--border-soft);
    font-size: 10.5px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .live-pip { position: relative; width: 8px; height: 8px; }
  .live-pip span { position:absolute; inset:0; border-radius:50%; }
  .live-pip .ping { background: var(--live); opacity:.75; animation: ping 1.6s cubic-bezier(0,0,.2,1) infinite; }
  .live-pip .core { background: var(--live); transform: scale(.55); }
  @keyframes ping { 75%,100% { transform: scale(2.4); opacity: 0; } }

  /* ---------------- Main viewer ---------------- */
  .main {
    display: flex;
    flex-direction: column;
    min-width: 0;
    padding: 14px 14px 14px 0;
  }

  .viewer-shell {
    flex: 1;
    display: flex;
    flex-direction: column;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--panel);
    backdrop-filter: blur(14px) saturate(130%);
    -webkit-backdrop-filter: blur(14px) saturate(130%);
    box-shadow: 0 0 40px rgba(124,58,237,0.08);
    min-height: 0;
  }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 14px;
    border-bottom: 1px solid var(--border-soft);
    background: rgba(10,8,18,0.35);
  }
  .toolbar .title {
    font-size: 14px; font-weight: 700; letter-spacing: -0.01em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .toolbar .url-pill {
    flex: 1;
    min-width: 0;
    font-size: 12px;
    color: var(--text-dim);
    background: rgba(191,128,255,0.05);
    border: 1px solid var(--border-soft);
    border-radius: 999px;
    padding: 6px 13px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .btn {
    cursor: pointer;
    border: 1px solid var(--border);
    background: rgba(191,128,255,0.05);
    color: var(--text);
    border-radius: 999px;
    padding: 7px 14px;
    font-size: 12.5px;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    white-space: nowrap;
    transition: transform .15s, background .15s, border-color .15s, box-shadow .15s;
  }
  .btn:hover { background: rgba(191,128,255,0.12); transform: translateY(-1px); }
  .btn svg { width: 15px; height: 15px; }
  .btn.primary {
    border-color: rgba(168,85,247,0.5);
    background: rgba(168,85,247,0.18);
    color: #f1e6ff;
    box-shadow: 0 0 16px rgba(168,85,247,0.18);
  }
  .btn.primary:hover { background: rgba(168,85,247,0.28); }

  .frame-wrap {
    position: relative;
    flex: 1;
    min-height: 0;
    background: #0a0810;
  }
  iframe.viewer {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
    background: #0a0810;
  }

  /* Loading + fallback overlay */
  .overlay {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    text-align: center;
    padding: 30px;
    background: rgba(8,6,14,0.92);
  }
  .overlay.show { display: flex; }
  .overlay .spinner {
    width: 34px; height: 34px; border-radius: 50%;
    border: 3px solid rgba(191,128,255,0.18);
    border-top-color: var(--accent);
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .overlay h3 { font-size: 16px; font-weight: 700; }
  .overlay p { font-size: 13px; color: var(--text-dim); max-width: 430px; line-height: 1.55; }

  /* ---------------- Mobile ---------------- */
  /* Mobile menu backdrop: hidden + out of grid flow on all sizes by default */
  .scrim { display: none; position: fixed; inset: 0; z-index: 20; background: rgba(0,0,0,0.5); }

  .mobile-bar { display: none; }
  @media (max-width: 820px) {
    .app { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    .sidebar {
      position: fixed;
      z-index: 30;
      top: 0; bottom: 0; left: 0;
      width: 86%;
      max-width: 320px;
      transform: translateX(-105%);
      transition: transform .25s ease;
    }
    .sidebar.open { transform: translateX(0); }
    .main { padding: 0; }
    .viewer-shell { border-radius: 0; border-left: 0; border-right: 0; border-bottom: 0; }
    .mobile-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: var(--panel);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      z-index: 2;
      position: relative;
    }
    .mobile-bar h1 { font-size: 16px; font-weight: 800; }
    .hamburger {
      cursor: pointer; background: rgba(191,128,255,0.07);
      border: 1px solid var(--border); border-radius: 10px;
      width: 40px; height: 40px; display: grid; place-items: center;
      color: var(--text);
    }
    .hamburger svg { width: 20px; height: 20px; }
    .scrim.show { display: block; }
    .toolbar .title { display: none; }
  }
</style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div id="veil"></div>

  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <h1><span class="logo">🛰️</span> JMS Hub</h1>
        <p>Mission control for all live dashboards</p>
      </div>
      <div class="nav-label">Projects</div>
      <nav class="nav" id="nav"><!-- buttons injected by JS --></nav>
      <div class="sidebar-foot">
        <span class="live-pip"><span class="ping"></span><span class="core"></span></span>
        <span id="foot-count">All systems live</span>
      </div>
    </aside>
    <div class="scrim" id="scrim"></div>

    <!-- Main -->
    <section class="main">
      <div class="mobile-bar">
        <button class="hamburger" id="hamburger" aria-label="Open menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1>JMS Hub</h1>
      </div>

      <div class="viewer-shell">
        <div class="toolbar">
          <span class="title" id="vw-title">—</span>
          <span class="url-pill" id="vw-url">Select a project</span>
          <button class="btn" id="vw-reload" title="Reload panel">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            Reload
          </button>
          <a class="btn primary" id="vw-external" href="#" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            Open in new tab
          </a>
        </div>
        <div class="frame-wrap">
          <iframe class="viewer" id="viewer" title="Project viewer"></iframe>
          <div class="overlay" id="overlay">
            <div class="spinner" id="ov-spinner"></div>
            <h3 id="ov-title">Loading…</h3>
            <p id="ov-msg"></p>
            <a class="btn primary" id="ov-link" href="#" target="_blank" rel="noopener" style="display:none">Open in new tab</a>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
  /* =========================================================
     1) PROJECT LIST  ——  EDIT THIS to add/remove dashboards.
        Each entry:  { name: "...", url: "https://..." }
        Optional:    embed: false  -> for any site that truly
        refuses to be framed; shows an "open in new tab" panel.
     ========================================================= */
  const PROJECTS = [
    { name: "BoomRx Maps",            url: "https://boomrxmaps.com/" },
    { name: "JMS Shipment Tracker",   url: "https://flbocateam.github.io/JMS-Shipment-Tracker/index.html" },
    { name: "JMS Clinic Order Streak",url: "https://jms-metrics.github.io/Clinic-Ordering-History/" },
    { name: "JMS Sales Dashboard",    url: "https://flbocateam.github.io/JMS-Dashboard/" },
    // Local-only project: master copy lives in your Obsidian vault. A published
    // copy is committed into THIS repo at projects/jack-mark-32/index.html and
    // served by the hub's own GitHub Pages (same-origin, always embeds).
    { name: "Jack/Mark 32 Rep Transfer", url: "projects/jack-mark-32/index.html" },
    // { name: "New Project",         url: "https://your-new-url.com/" },
  ];

  /* =========================================================
     2) Wiring (no need to edit below for normal use)
     ========================================================= */
  const navEl     = document.getElementById('nav');
  const viewer    = document.getElementById('viewer');
  const vwTitle   = document.getElementById('vw-title');
  const vwUrl     = document.getElementById('vw-url');
  const vwExt     = document.getElementById('vw-external');
  const vwReload  = document.getElementById('vw-reload');
  const overlay   = document.getElementById('overlay');
  const ovSpinner = document.getElementById('ov-spinner');
  const ovTitle   = document.getElementById('ov-title');
  const ovMsg     = document.getElementById('ov-msg');
  const ovLink    = document.getElementById('ov-link');
  const footCount = document.getElementById('foot-count');

  let activeIndex = -1;
  let loadTimer   = null;

  const hostOf = (u) => { try { return new URL(u, location.href).hostname.replace(/^www\./, '') || u; } catch { return u; } };

  PROJECTS.forEach((p, i) => {
    const b = document.createElement('button');
    b.className = 'proj-btn';
    b.innerHTML = `
      <span class="dot"></span>
      <span class="meta">
        <span class="name">${p.name}</span>
        <span class="host">${hostOf(p.url)}</span>
      </span>`;
    b.addEventListener('click', () => selectProject(i));
    navEl.appendChild(b);
  });
  footCount.textContent = `${PROJECTS.length} live ${PROJECTS.length === 1 ? 'project' : 'projects'}`;

  function selectProject(i) {
    activeIndex = i;
    const p = PROJECTS[i];

    [...navEl.children].forEach((c, idx) => c.classList.toggle('active', idx === i));

    vwTitle.textContent = p.name;
    vwUrl.textContent   = p.url;
    vwExt.href          = p.url;
    ovLink.href         = p.url;

    // Known non-embeddable project: show the fallback panel immediately.
    if (p.embed === false) {
      clearTimeout(loadTimer);
      viewer.onload = null;
      viewer.removeAttribute('src');
      overlay.classList.add('show');
      ovSpinner.style.display = 'none';
      ovTitle.textContent = p.name + ' opens in its own window';
      ovMsg.textContent   = p.name + " blocks being embedded inside other pages, so it can't display in this panel. Use the button below or “Open in new tab” above.";
      ovLink.textContent  = 'Open ' + p.name;
      ovLink.style.display = 'inline-flex';
      closeSidebar();
      if (history.replaceState) history.replaceState(null, '', '#' + i);
      return;
    }

    // Show loading overlay
    overlay.classList.add('show');
    ovSpinner.style.display = 'block';
    ovTitle.textContent = 'Loading ' + p.name + '…';
    ovMsg.textContent   = '';
    ovLink.textContent  = 'Open in new tab';
    ovLink.style.display = 'none';

    clearTimeout(loadTimer);
    viewer.onload = () => { clearTimeout(loadTimer); overlay.classList.remove('show'); };
    // Generous safety net: heavy dashboards (e.g. map apps) can take 15s+ to
    // first paint. Only show this gentle fallback if the frame truly never loads.
    loadTimer = setTimeout(() => {
      ovSpinner.style.display = 'none';
      ovTitle.textContent = p.name + ' is taking a while to load';
      ovMsg.textContent   = "It's a heavy dashboard, so give it a moment. You can hit Reload, or open it in its own tab.";
      ovLink.textContent  = 'Open ' + p.name;
      ovLink.style.display = 'inline-flex';
    }, 20000);

    viewer.src = p.url;
    closeSidebar();
    if (history.replaceState) history.replaceState(null, '', '#' + i);
  }

  vwReload.addEventListener('click', () => { if (activeIndex >= 0) selectProject(activeIndex); });

  // Mobile sidebar
  const sidebar = document.getElementById('sidebar');
  const scrim   = document.getElementById('scrim');
  document.getElementById('hamburger').addEventListener('click', () => {
    sidebar.classList.add('open'); scrim.classList.add('show');
  });
  function closeSidebar() { sidebar.classList.remove('open'); scrim.classList.remove('show'); }
  scrim.addEventListener('click', closeSidebar);

  const startIdx = Math.min(Math.max(parseInt(location.hash.slice(1)) || 0, 0), PROJECTS.length - 1);
  if (PROJECTS.length) selectProject(startIdx);

  /* =========================================================
     3) "Aether Flow" interactive particle-network background
        (vanilla port — purple particles, distance-linked,
         repelled by the cursor)
     ========================================================= */
  (function initParticles() {
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let animId = null;
    const mouse = { x: null, y: null, radius: 160 };

    class Particle {
      constructor(x, y, dx, dy, size) {
        this.x = x; this.y = y; this.dx = dx; this.dy = dy; this.size = size;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
        ctx.fillStyle = 'rgba(191, 128, 255, 0.8)';
        ctx.fill();
      }
      update() {
        if (this.x > canvas.width || this.x < 0) this.dx = -this.dx;
        if (this.y > canvas.height || this.y < 0) this.dy = -this.dy;
        if (mouse.x !== null) {
          const ddx = mouse.x - this.x, ddy = mouse.y - this.y;
          const dist = Math.hypot(ddx, ddy);
          if (dist < mouse.radius + this.size && dist > 0) {
            const force = (mouse.radius - dist) / mouse.radius;
            this.x -= (ddx / dist) * force * 4;
            this.y -= (ddy / dist) * force * 4;
          }
        }
        this.x += this.dx;
        this.y += this.dy;
        this.draw();
      }
    }

    function init() {
      particles = [];
      const count = Math.min((canvas.width * canvas.height) / 9000, 260);
      for (let i = 0; i < count; i++) {
        const size = Math.random() * 2 + 1;
        const x = Math.random() * (canvas.width  - size * 4) + size * 2;
        const y = Math.random() * (canvas.height - size * 4) + size * 2;
        const dx = (Math.random() * 0.4) - 0.2;
        const dy = (Math.random() * 0.4) - 0.2;
        particles.push(new Particle(x, y, dx, dy, size));
      }
    }

    function connect() {
      for (let a = 0; a < particles.length; a++) {
        for (let b = a; b < particles.length; b++) {
          const d = (particles[a].x - particles[b].x) ** 2 + (particles[a].y - particles[b].y) ** 2;
          if (d < 20000) {
            const op = 1 - (d / 20000);
            let nearMouse = false;
            if (mouse.x !== null) {
              const dmx = particles[a].x - mouse.x, dmy = particles[a].y - mouse.y;
              if (Math.hypot(dmx, dmy) < mouse.radius) nearMouse = true;
            }
            ctx.strokeStyle = nearMouse
              ? 'rgba(255, 255, 255, ' + op + ')'
              : 'rgba(168, 130, 235, ' + op + ')';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(particles[a].x, particles[a].y);
            ctx.lineTo(particles[b].x, particles[b].y);
            ctx.stroke();
          }
        }
      }
    }

    function animate() {
      animId = requestAnimationFrame(animate);
      ctx.fillStyle = '#000000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < particles.length; i++) particles[i].update();
      connect();
    }

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      init();
    }

    window.addEventListener('resize', resize);
    window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('mouseout', () => { mouse.x = null; mouse.y = null; });
    resize();
    animate();
  })();
  </script>
</body>
</html>
