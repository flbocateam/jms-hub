<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JMS Hub — Project Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛰️</text></svg>" />
<style>
  /* =========================================================
     JMS HUB — single-file static dashboard
     To ADD / EDIT / REMOVE a project, scroll to the
     PROJECTS array near the bottom of this file. That's the
     only thing you need to touch.
     ========================================================= */

  :root {
    --bg: #000000;
    --panel: rgba(15, 15, 18, 0.55);
    --panel-solid: #0c0c0f;
    --border: #27272a;
    --border-soft: rgba(255, 255, 255, 0.08);
    --text: #f4f4f5;
    --text-dim: rgba(244, 244, 245, 0.55);
    --accent: #22c55e;
    --radius: 14px;
    --sidebar-w: 290px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden;
  }

  /* Shader canvas sits behind everything */
  #shader-canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    z-index: 0;
  }

  /* Dark veil so the glowing shader doesn't wash out the UI */
  #veil {
    position: fixed;
    inset: 0;
    z-index: 1;
    background:
      radial-gradient(120% 90% at 50% -10%, rgba(0,0,0,0.25), rgba(0,0,0,0.78) 70%),
      linear-gradient(180deg, rgba(0,0,0,0.35), rgba(0,0,0,0.6));
    pointer-events: none;
  }

  .app {
    position: relative;
    z-index: 2;
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    grid-template-rows: 100vh;
    height: 100vh;
  }

  /* ---------------- Sidebar ---------------- */
  .sidebar {
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .brand {
    padding: 22px 20px 16px;
    border-bottom: 1px solid var(--border-soft);
  }
  .brand h1 {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.03em;
    display: flex;
    align-items: center;
    gap: 9px;
  }
  .brand .logo {
    width: 30px; height: 30px; border-radius: 9px;
    display: grid; place-items: center;
    background: linear-gradient(160deg, #1f2937, #0b0b0d);
    border: 1px solid var(--border);
    font-size: 16px;
  }
  .brand p {
    margin-top: 6px;
    font-size: 11.5px;
    color: var(--text-dim);
    letter-spacing: 0.02em;
  }

  .nav-label {
    padding: 16px 20px 8px;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-dim);
  }

  .nav {
    flex: 1;
    overflow-y: auto;
    padding: 0 12px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .nav::-webkit-scrollbar { width: 8px; }
  .nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }

  .proj-btn {
    width: 100%;
    text-align: left;
    cursor: pointer;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text);
    border-radius: 11px;
    padding: 12px 13px;
    display: flex;
    align-items: center;
    gap: 11px;
    transition: background .18s, border-color .18s, transform .18s;
  }
  .proj-btn:hover { background: rgba(255,255,255,0.05); border-color: var(--border-soft); }
  .proj-btn.active {
    background: rgba(255,255,255,0.07);
    border-color: var(--border);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04), 0 0 18px rgba(34,197,94,0.06);
  }
  .proj-btn .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 4px rgba(34,197,94,0.15);
    flex-shrink: 0;
  }
  .proj-btn .meta { min-width: 0; }
  .proj-btn .name {
    font-size: 13.5px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .proj-btn .host {
    font-size: 11px; color: var(--text-dim);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .sidebar-foot {
    padding: 12px 16px 16px;
    border-top: 1px solid var(--border-soft);
    font-size: 10.5px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .live-pip {
    position: relative; width: 8px; height: 8px;
  }
  .live-pip span { position:absolute; inset:0; border-radius:50%; }
  .live-pip .ping { background: var(--accent); opacity:.75; animation: ping 1.6s cubic-bezier(0,0,.2,1) infinite; }
  .live-pip .core { background: var(--accent); transform: scale(.55); }
  @keyframes ping { 75%,100% { transform: scale(2.4); opacity: 0; } }

  /* ---------------- Main viewer ---------------- */
  .main {
    display: flex;
    flex-direction: column;
    min-width: 0;
    padding: 14px 14px 14px 0;
  }

  .viewer-shell {
    flex: 1;
    display: flex;
    flex-direction: column;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--panel);
    backdrop-filter: blur(14px) saturate(130%);
    -webkit-backdrop-filter: blur(14px) saturate(130%);
    min-height: 0;
  }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 14px;
    border-bottom: 1px solid var(--border-soft);
    background: rgba(0,0,0,0.25);
  }
  .toolbar .title {
    font-size: 14px; font-weight: 700; letter-spacing: -0.01em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .toolbar .url-pill {
    flex: 1;
    min-width: 0;
    font-size: 12px;
    color: var(--text-dim);
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border-soft);
    border-radius: 999px;
    padding: 6px 13px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .btn {
    cursor: pointer;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.04);
    color: var(--text);
    border-radius: 999px;
    padding: 7px 14px;
    font-size: 12.5px;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    white-space: nowrap;
    transition: transform .15s, background .15s, border-color .15s;
  }
  .btn:hover { background: rgba(255,255,255,0.09); transform: translateY(-1px); }
  .btn svg { width: 15px; height: 15px; }
  .btn.primary {
    border-color: rgba(34,197,94,0.4);
    background: rgba(34,197,94,0.12);
    color: #d9ffe6;
  }
  .btn.primary:hover { background: rgba(34,197,94,0.2); }

  .frame-wrap {
    position: relative;
    flex: 1;
    min-height: 0;
    background: #0a0a0c;
  }
  iframe.viewer {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
    background: #0a0a0c;
  }

  /* Loading + blocked fallback overlay */
  .overlay {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    text-align: center;
    padding: 30px;
    background: rgba(8,8,10,0.92);
  }
  .overlay.show { display: flex; }
  .overlay .spinner {
    width: 34px; height: 34px; border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.12);
    border-top-color: var(--accent);
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .overlay h3 { font-size: 16px; font-weight: 700; }
  .overlay p { font-size: 13px; color: var(--text-dim); max-width: 420px; line-height: 1.55; }

  /* Mobile menu backdrop: hidden + out of grid flow on all sizes by default */
  .scrim { display: none; position: fixed; inset: 0; z-index: 20; background: rgba(0,0,0,0.5); }

  /* ---------------- Mobile ---------------- */
  .mobile-bar { display: none; }
  @media (max-width: 820px) {
    .app { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    .sidebar {
      position: fixed;
      z-index: 30;
      top: 0; bottom: 0; left: 0;
      width: 86%;
      max-width: 320px;
      transform: translateX(-105%);
      transition: transform .25s ease;
    }
    .sidebar.open { transform: translateX(0); }
    .main { padding: 0; }
    .viewer-shell { border-radius: 0; border-left: 0; border-right: 0; border-bottom: 0; }
    .mobile-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: var(--panel);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      z-index: 2;
      position: relative;
    }
    .mobile-bar h1 { font-size: 16px; font-weight: 800; }
    .hamburger {
      cursor: pointer; background: rgba(255,255,255,0.05);
      border: 1px solid var(--border); border-radius: 10px;
      width: 40px; height: 40px; display: grid; place-items: center;
    }
    .hamburger svg { width: 20px; height: 20px; }
    .scrim {
      display: none; position: fixed; inset: 0; z-index: 20;
      background: rgba(0,0,0,0.5);
    }
    .scrim.show { display: block; }
    .toolbar .title { display: none; }
  }
</style>
</head>
<body>
  <canvas id="shader-canvas"></canvas>
  <div id="veil"></div>

  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <h1><span class="logo">🛰️</span> JMS Hub</h1>
        <p>Mission control for all live dashboards</p>
      </div>
      <div class="nav-label">Projects</div>
      <nav class="nav" id="nav"><!-- buttons injected by JS --></nav>
      <div class="sidebar-foot">
        <span class="live-pip"><span class="ping"></span><span class="core"></span></span>
        <span id="foot-count">All systems live</span>
      </div>
    </aside>
    <div class="scrim" id="scrim"></div>

    <!-- Main -->
    <section class="main">
      <div class="mobile-bar">
        <button class="hamburger" id="hamburger" aria-label="Open menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1>JMS Hub</h1>
      </div>

      <div class="viewer-shell">
        <div class="toolbar">
          <span class="title" id="vw-title">—</span>
          <span class="url-pill" id="vw-url">Select a project</span>
          <button class="btn" id="vw-reload" title="Reload panel">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            Reload
          </button>
          <a class="btn primary" id="vw-external" href="#" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            Open in new tab
          </a>
        </div>
        <div class="frame-wrap">
          <iframe class="viewer" id="viewer" title="Project viewer"></iframe>
          <div class="overlay" id="overlay">
            <div class="spinner" id="ov-spinner"></div>
            <h3 id="ov-title">Loading…</h3>
            <p id="ov-msg"></p>
            <a class="btn primary" id="ov-link" href="#" target="_blank" rel="noopener" style="display:none">Open in new tab</a>
          </div>
        </div>
      </div>
    </section>
  </div>

  <!-- Three.js for the shader background -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script>
  /* =========================================================
     1) PROJECT LIST  ——  EDIT THIS to add/remove dashboards.
        Each entry:  { name: "...", url: "https://..." }
        Add as many as you like; the sidebar grows automatically.
     ========================================================= */
  const PROJECTS = [
    // embed:false -> BoomRx blocks iframe embedding (X-Frame-Options on its host),
    // so the hub opens it in a new tab instead of showing a blank panel.
    { name: "BoomRx Maps",            url: "https://boomrxmaps.com/", embed: false },
    { name: "JMS Shipment Tracker",   url: "https://flbocateam.github.io/JMS-Shipment-Tracker/index.html" },
    { name: "JMS Clinic Order Streak",url: "https://jms-metrics.github.io/Clinic-Ordering-History/" },
    { name: "JMS Sales Dashboard",    url: "https://flbocateam.github.io/JMS-Dashboard/" },
    // Local-only project: master copy lives in your Obsidian vault. A published
    // copy is committed into THIS repo at projects/jack-mark-32/index.html and
    // served by the hub's own GitHub Pages (same-origin, always embeds).
    { name: "Jack/Mark 32 Rep Transfer", url: "projects/jack-mark-32/index.html" },
    // { name: "New Project",         url: "https://your-new-url.com/" },
  ];

  /* =========================================================
     2) Wiring (no need to edit below for normal use)
     ========================================================= */
  const navEl     = document.getElementById('nav');
  const viewer    = document.getElementById('viewer');
  const vwTitle   = document.getElementById('vw-title');
  const vwUrl     = document.getElementById('vw-url');
  const vwExt     = document.getElementById('vw-external');
  const vwReload  = document.getElementById('vw-reload');
  const overlay   = document.getElementById('overlay');
  const ovSpinner = document.getElementById('ov-spinner');
  const ovTitle   = document.getElementById('ov-title');
  const ovMsg     = document.getElementById('ov-msg');
  const ovLink    = document.getElementById('ov-link');
  const footCount = document.getElementById('foot-count');

  let activeIndex = -1;
  let loadTimer   = null;

  const hostOf = (u) => { try { return new URL(u).hostname.replace(/^www\./, ''); } catch { return u; } };

  // Build sidebar buttons
  PROJECTS.forEach((p, i) => {
    const b = document.createElement('button');
    b.className = 'proj-btn';
    b.innerHTML = `
      <span class="dot"></span>
      <span class="meta">
        <span class="name">${p.name}</span>
        <span class="host">${hostOf(p.url)}</span>
      </span>`;
    b.addEventListener('click', () => selectProject(i));
    navEl.appendChild(b);
  });
  footCount.textContent = `${PROJECTS.length} live ${PROJECTS.length === 1 ? 'project' : 'projects'}`;

  function selectProject(i) {
    activeIndex = i;
    const p = PROJECTS[i];

    [...navEl.children].forEach((c, idx) => c.classList.toggle('active', idx === i));

    vwTitle.textContent = p.name;
    vwUrl.textContent   = p.url;
    vwExt.href          = p.url;
    ovLink.href         = p.url;

    // Known non-embeddable project: show the fallback panel immediately
    // instead of attempting (and failing) to load it in the iframe.
    if (p.embed === false) {
      clearTimeout(loadTimer);
      viewer.onload = null;
      viewer.removeAttribute('src');
      overlay.classList.add('show');
      ovSpinner.style.display = 'none';
      ovTitle.textContent = p.name + ' opens in its own window';
      ovMsg.textContent   = p.name + " blocks being embedded inside other pages (a security setting on its host), so it can't display in this panel. Use the button below or “Open in new tab” above.";
      ovLink.textContent  = 'Open ' + p.name;
      ovLink.style.display = 'inline-flex';
      closeSidebar();
      if (history.replaceState) history.replaceState(null, '', '#' + i);
      return;
    }

    // Show loading overlay
    overlay.classList.add('show');
    ovSpinner.style.display = 'block';
    ovTitle.textContent = 'Loading ' + p.name + '…';
    ovMsg.textContent   = '';
    ovLink.textContent  = 'Open in new tab';
    ovLink.style.display = 'none';

    // If it loads, hide overlay. If it never loads (blocked by the
    // site's frame headers), show a clean fallback after a timeout.
    clearTimeout(loadTimer);
    viewer.onload = () => { clearTimeout(loadTimer); overlay.classList.remove('show'); };
    loadTimer = setTimeout(() => {
      ovSpinner.style.display = 'none';
      ovTitle.textContent = 'This dashboard blocks embedding';
      ovMsg.textContent   = p.name + " can't be shown inside the hub because its host doesn't allow being framed. Open it in a new tab instead — everything else works normally.";
      ovLink.textContent  = 'Open ' + p.name;
      ovLink.style.display = 'inline-flex';
    }, 6000);

    viewer.src = p.url;
    closeSidebar();
    if (history.replaceState) history.replaceState(null, '', '#' + i);
  }

  vwReload.addEventListener('click', () => { if (activeIndex >= 0) selectProject(activeIndex); });

  // Mobile sidebar
  const sidebar = document.getElementById('sidebar');
  const scrim   = document.getElementById('scrim');
  document.getElementById('hamburger').addEventListener('click', () => {
    sidebar.classList.add('open'); scrim.classList.add('show');
  });
  function closeSidebar() { sidebar.classList.remove('open'); scrim.classList.remove('show'); }
  scrim.addEventListener('click', closeSidebar);

  // Open first project (or the one in the URL hash)
  const startIdx = Math.min(Math.max(parseInt(location.hash.slice(1)) || 0, 0), PROJECTS.length - 1);
  if (PROJECTS.length) selectProject(startIdx);

  /* =========================================================
     3) WebGL shader background (vanilla port of the theme)
     ========================================================= */
  (function initShader() {
    const canvas = document.getElementById('shader-canvas');
    if (!window.THREE) return;

    const vertex = `
      attribute vec3 position;
      void main() { gl_Position = vec4(position, 1.0); }`;
    const fragment = `
      precision highp float;
      uniform vec2  resolution;
      uniform float time;
      uniform float xScale;
      uniform float yScale;
      uniform float distortion;
      void main() {
        vec2 p = (gl_FragCoord.xy * 2.0 - resolution) / min(resolution.x, resolution.y);
        float d = length(p) * distortion;
        float rx = p.x * (1.0 + d);
        float gx = p.x;
        float bx = p.x * (1.0 - d);
        float r = 0.05 / abs(p.y + sin((rx + time) * xScale) * yScale);
        float g = 0.05 / abs(p.y + sin((gx + time) * xScale) * yScale);
        float b = 0.05 / abs(p.y + sin((bx + time) * xScale) * yScale);
        gl_FragColor = vec4(r, g, b, 1.0);
      }`;

    const renderer = new THREE.WebGLRenderer({ canvas });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(new THREE.Color(0x000000));

    const scene  = new THREE.Scene();
    const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, -1);

    const uniforms = {
      resolution: { value: [window.innerWidth, window.innerHeight] },
      time:       { value: 0.0 },
      xScale:     { value: 1.0 },
      yScale:     { value: 0.5 },
      distortion: { value: 0.05 },
    };

    const verts = new Float32Array([
      -1,-1,0,  1,-1,0,  -1,1,0,
       1,-1,0,  -1,1,0,   1,1,0,
    ]);
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(verts, 3));

    const mat = new THREE.RawShaderMaterial({
      vertexShader: vertex,
      fragmentShader: fragment,
      uniforms,
      side: THREE.DoubleSide,
    });
    scene.add(new THREE.Mesh(geo, mat));

    function resize() {
      const w = window.innerWidth, h = window.innerHeight;
      renderer.setSize(w, h, false);
      uniforms.resolution.value = [w, h];
    }
    window.addEventListener('resize', resize);
    resize();

    (function animate() {
      uniforms.time.value += 0.008;
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    })();
  })();
  </script>
</body>
</html>
